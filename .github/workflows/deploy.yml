name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Show environment
        run: |
          set -euxo pipefail
          quarto --version
          uname -a
          ls -la

      - name: Clean build artifacts
        run: |
          set -euxo pipefail
          rm -rf _site .quarto _generated .tmp

      - name: Run pre-render generators
        run: |
          set -euxo pipefail
          bash scripts/build_idea_blogs.sh
          ls -la _generated

      - name: Render site
        run: |
          set -o pipefail
          quarto render --verbose 2>&1 | tee quarto-render.log

      - name: Verify rendered homepage
        run: |
          set -euxo pipefail
          test -f _site/index.html
          touch _site/.nojekyll

      - name: Upload render log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarto-render-log
          path: quarto-render.log

      # Use the official Pages artifact action (required format for deploy-pages).
      - name: Upload Pages artifact
        # Prevent duplicate `github-pages` artifacts on workflow re-runs.
        # Re-runs can otherwise create a second artifact with the same name.
        if: github.run_attempt == 1
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
